name: Bazel Build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    # Run once a day
    - cron:  '0 12 * * *'
  workflow_dispatch:
    inputs:
      halt-for-connection:
        description: 'Should this workflow run wait for a remote connection?'
        type: choice
        required: true
        default: 'no'
        options:
          - 'yes'
          - 'no'

# Ensure that only a single job or workflow using the same
# concurrency group will run at a time. This would cancel
# any in-progress jobs in the same github workflow and github
# ref (e.g. refs/heads/main or refs/pull/<pr_number>/merge).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'main' }}

jobs:
  bazel-build:
    strategy:
      fail-fast: false
    runs-on: ${{ github.repository == 'openxla/stablehlo' && 'linux-x86-n2-16' ||  'ubuntu-22.04'  }}
    container: "us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest"

    steps:
    # Checkout StableHLO with all commits in the chain
    - name: Checkout StableHLO
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        path: "openxla/stablehlo"
        fetch-depth: $(( ${{ github.event_name == 'pull_request' && github.event.pull_request.commits || 0 }} + 1 ))
        set-safe-directory: true

    - name: "Wait For Connection"
      uses: google-ml-infra/actions/ci_connection@7f5ca0c263a81ed09ea276524c1b9192f1304e3c
      with:
        halt-dispatch-input: ${{ inputs.halt-for-connection }}

    - name: Validate LLVM Commit
      run: |
        cd openxla/stablehlo
        git config --global --add safe.directory .
        ./build_tools/github_actions/lint_llvm_commit.sh .

    - name: Get LLVM Version
      id: llvm-version
      shell: bash
      run: |
        echo "version=$(cat ./build_tools/llvm_version.txt)" >> $GITHUB_OUTPUT

    - name: Build and check docs
      shell: bash
      run: |
        ./build_tools/github_actions/ci_build_docs.sh -c

    - name: Build and Test StableHLO (Diff Only)
      if: ${{ github.event_name == 'pull_request' }}
      shell: bash
      run: |
        echo "$PWD" >> $GITHUB_OUTPUT
        echo "$PWD"
        git status
        START_HASH=${{ github.event.pull_request.base.sha }}
        END_HASH=${{ github.event.pull_request.head.sha }}
        BAZEL_DIFF=/tmp/bazel-diff.jar
        curl -Lo "$BAZEL_DIFF" https://github.com/Tinder/bazel-diff/releases/download/17.0.2/bazel-diff_deploy.jar
        ./build_tools/github_actions/ci_build_bazel.sh "$BAZEL_DIFF" "$START_HASH" "$END_HASH"

    - name: Build and Test StableHLO (All)
      if: ${{ github.event_name != 'pull_request' }}
      shell: bash
      run: |
        ./build_tools/github_actions/ci_build_bazel.sh

